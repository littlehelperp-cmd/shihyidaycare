<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長照需要等級 CMS 1–8</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #F7F0E6;
    --latte:      #E8D5B7;
    --caramel:    #C9A87C;
    --mocha:      #8B6347;
    --espresso:   #5C3D2E;
    --warm-white: #FBF6EE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 60px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(201,168,124,.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(139,99,71,.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .page-header { text-align: center; margin-bottom: 48px; }
  .page-header .badge {
    display: inline-block;
    background: var(--caramel); color: var(--warm-white);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px; letter-spacing: .15em;
    padding: 5px 18px; border-radius: 20px; margin-bottom: 14px;
  }
  .page-header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(26px, 5vw, 42px);
    color: var(--espresso); font-weight: 700; line-height: 1.25;
  }
  .page-header h1 span { color: var(--caramel); }
  .page-header p { margin-top: 10px; color: var(--mocha); font-size: 15px; font-weight: 300; letter-spacing: .05em; }
  .divider { display: flex; align-items: center; gap: 12px; max-width: 320px; margin: 18px auto 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--caramel), transparent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px; max-width: 1080px; margin: 0 auto;
  }
  .card {
    background: var(--warm-white);
    border-radius: 20px; padding: 28px 26px 26px;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(92,61,46,.06), 0 8px 24px rgba(92,61,46,.05);
    transition: transform .3s ease, box-shadow .3s ease;
    animation: fadeUp .5s ease both;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 4px 12px rgba(92,61,46,.1), 0 16px 36px rgba(92,61,46,.09); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.12s}
  .card:nth-child(3){animation-delay:.19s} .card:nth-child(4){animation-delay:.26s}
  .card:nth-child(5){animation-delay:.33s} .card:nth-child(6){animation-delay:.40s}
  .card:nth-child(7){animation-delay:.47s} .card:nth-child(8){animation-delay:.54s}

  .card::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 100px; height: 100px; border-radius: 50%; opacity: .18;
    background: var(--c);
  }
  .lv1{--c:#A8C4C8} .lv2{--c:#9CAF88} .lv3{--c:#B5C49A} .lv4{--c:#C9A87C}
  .lv5{--c:#C49A72} .lv6{--c:#B8856A} .lv7{--c:#C07070} .lv8{--c:#A85858}

  .level-tag { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .level-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--c); color: #fff;
    font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(0,0,0,.12);
  }
  .level-label { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 600; color: var(--espresso); }
  .level-sub { font-size: 12px; font-weight: 400; color: var(--mocha); display: block; letter-spacing: .04em; }

  .illus {
    width: 100%; height: 130px; border-radius: 14px;
    background: color-mix(in srgb, var(--c) 18%, var(--latte));
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px; position: relative; overflow: hidden;
  }
  .illus::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.28) 0%, transparent 60%);
    border-radius: 14px; pointer-events: none;
  }
  .illus svg { width: 115px; height: 115px; position: relative; z-index: 1; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag {
    padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 500;
    background: color-mix(in srgb, var(--c) 22%, var(--cream));
    color: var(--espresso); letter-spacing: .03em;
  }
  .desc { font-size: 13.5px; line-height: 1.75; color: var(--mocha); }

  .severity-bar { margin-top: 18px; height: 5px; border-radius: 4px; background: var(--latte); overflow: hidden; }
  .severity-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--c), color-mix(in srgb, var(--c) 60%, var(--espresso)));
  }

  .legend {
    max-width: 1080px; margin: 40px auto 0;
    display: flex; flex-wrap: wrap; gap: 12px 24px;
    justify-content: center; font-size: 13px; color: var(--mocha);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  footer { text-align: center; margin-top: 52px; font-size: 12px; color: var(--caramel); letter-spacing: .06em; }
</style>
</head>
